<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Встановити новий пароль | ClinicApp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="login-body">

<div class="login-card">
    <h1 class="login-title">Встановити новий пароль</h1>
    <p class="login-subtitle">Введіть ваш новий пароль.</p>

    <!-- Додані повідомлення про успіх/помилку для відновлення пароля -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <form th:action="@{/reset-password}" method="post" class="login-form">
        <input type="hidden" name="token" th:value="${token}">
        <div class="form-group">
            <label for="newPassword">Новий пароль</label>
            <input type="password" id="newPassword" name="newPassword"
                   placeholder="Введіть новий пароль" required>
        </div>
        <div class="form-group">
            <label for="confirmPassword">Підтвердіть пароль</label>
            <input type="password" id="confirmPassword" name="confirmPassword"
                   placeholder="Повторіть пароль" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Змінити пароль</button>
    </form>

    <p class="login-hint">
        <a th:href="@{/login}">Повернутися до входу</a>
    </p>

</div>

</body>
</html>
