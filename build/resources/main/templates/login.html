<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Вхід | ClinicApp</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="login-body">

<div class="login-card">
  <div class="login-logo">🏥</div>
  <h1 class="login-title">ClinicApp</h1>
  <p class="login-subtitle">Система обліку пацієнтів</p>

  <!-- Повідомлення про помилку авторизації -->
  <div th:if="${param.error}" class="alert alert-error">
    Невірний логін або пароль.
  </div>
  <!-- Повідомлення про вихід -->
  <div th:if="${param.logout}" class="alert alert-success">
    Ви успішно вийшли з системи.
  </div>
  <!-- Повідомлення про закінчення сесії -->
  <div th:if="${param.expired}" class="alert alert-error">
    Сесія закінчилася через неактивність. Увійдіть знову.
  </div>

  <!-- Форма входу — POST /login обробляє Spring Security -->
  <form th:action="@{/login}" method="post" class="login-form">
    <div class="form-group">
      <label for="username">Логін</label>
      <input type="text" id="username" name="username"
             placeholder="Введіть логін" required autofocus/>
    </div>
    <div class="form-group">
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password"
             placeholder="Введіть пароль" required/>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Увійти</button>
  </form>

  <p class="login-hint">
    Тестові облікові записи:<br/>
    <code>admin / admin123</code> &nbsp;|&nbsp;
    <code>doctor / doctor123</code>
  </p>
</div>

</body>
</html>
