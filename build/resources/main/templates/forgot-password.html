<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Відновлення пароля | ClinicApp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="login-body">

<div class="login-card">
    <h1 class="login-title">Відновлення пароля</h1>
    <p class="login-subtitle">Введіть ваш логін, щоб отримати інструкції для скидання пароля.</p>

    <!-- Додані повідомлення про успіх/помилку для відновлення пароля -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <form th:action="@{/forgot-password}" method="post" class="login-form">
        <div class="form-group">
            <label for="login">Логін</label>
            <input type="text" id="login" name="login"
                   placeholder="Введіть логін" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Відновити пароль</button>
    </form>

    <p class="login-hint">
        <a th:href="@{/login}">Повернутися до входу</a>
    </p>

</div>

</body>
</html>
