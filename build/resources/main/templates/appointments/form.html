<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content})}">
<body>
<th:block th:fragment="main-content">

    <h2 class="page-title">Новий запис на прийом</h2>

    <form th:object="${appointment}" th:action="@{/appointments/new}" method="post" class="card form-card form">

        <div class="form-group">
            <label for="patient">Пацієнт</label>
            <select id="patient" th:field="*{patient}" required class="form-control">
                <option value="">-- Виберіть пацієнта --</option>
                <option th:each="p : ${patients}"
                        th:value="${p.id}"
                        th:text="${p.fullName}">Patient Name</option>
            </select>
        </div>

        <div class="form-group">
            <label for="staff">Лікар</label>
            <select id="staff" th:field="*{staff}" required class="form-control">
                <option value="">-- Виберіть лікаря --</option>
                <option th:each="doc : ${doctors}"
                        th:value="${doc.id}"
                        th:text="${doc.fullName}">Doctor Name</option>
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="startTime">Дата та час</label>
                <input type="datetime-local" id="startTime" th:field="*{startTime}" required class="form-control" step="300">
            </div>
            <div class="form-group">
                <label for="duration">Тривалість (хв)</label>
                <select id="duration" th:field="*{duration}" required class="form-control">
                    <option value="30">30 хвилин</option>
                    <option value="60">60 хвилин</option>
                    <option value="90">90 хвилин</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Створити запис</button>
            <a th:href="@{/appointments}" class="btn btn-secondary">Скасувати</a>
        </div>
    </form>

</th:block>
</body>
</html>
