<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content})}">
<body>
<th:block th:fragment="main-content">

    <h2 class="page-title" th:text="${staff.id == null ? 'Новий співробітник' : 'Редагування співробітника'}"></h2>

    <form th:object="${staff}"
          th:action="${staff.id == null} ? @{/staff/new} : @{/staff/{id}/edit(id=${staff.id})}"
          method="post" class="card form-card form">

        <div class="form-row">
            <div class="form-group">
                <label for="firstName">Ім'я</label>
                <input type="text" id="firstName" th:field="*{firstName}" required>
            </div>
            <div class="form-group">
                <label for="lastName">Прізвище</label>
                <input type="text" id="lastName" th:field="*{lastName}" required>
            </div>
        </div>

        <div class="form-group">
            <label for="position">Посада</label>
            <input type="text" id="position" th:field="*{position}" required>
        </div>

        <hr style="border: none; border-top: 1px solid var(--border); margin: 8px 0;">

        <!-- Поля для логіна та пароля відображаються лише при створенні нового співробітника -->
        <div th:if="${staff.id == null}" class="form-row">
            <div class="form-group">
                <label for="login">Логін</label>
                <input type="text" id="login" th:field="*{user.login}" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required>
            </div>
        </div>

        <!-- Для існуючого співробітника показуємо логін, але не дозволяємо його змінювати -->
        <div th:if="${staff.id != null}" class="form-group">
            <label for="login-disabled">Логін</label>
            <input type="text" id="login-disabled" th:value="${staff.user.login}" disabled>
            <small class="text-muted">Логін та пароль не можна змінити через цю форму.</small>
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" th:field="*{medical}">
                <span>Це медичний персонал (лікар)</span>
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary" th:text="${staff.id == null ? 'Створити співробітника' : 'Зберегти зміни'}"></button>
            <a th:href="@{/staff}" class="btn btn-secondary">Скасувати</a>
        </div>
    </form>

</th:block>
</body>
</html>
