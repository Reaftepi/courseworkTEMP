<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content})}">
<body>
<th:block th:fragment="main-content">

    <h2 class="page-title">Новий співробітник</h2>

    <form th:action="@{/staff/new}" method="post" class="card form-card form">

        <div class="form-row">
            <div class="form-group">
                <label for="firstName">Ім'я</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>
            <div class="form-group">
                <label for="lastName">Прізвище</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>
        </div>

        <div class="form-group">
            <label for="position">Посада</label>
            <input type="text" id="position" name="position" required>
        </div>

        <hr style="border: none; border-top: 1px solid var(--border); margin: 8px 0;">

        <div class="form-row">
            <div class="form-group">
                <label for="login">Логін</label>
                <input type="text" id="login" name="login" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required>
            </div>
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="isMedical" value="true">
                <span>Це медичний персонал (лікар)</span>
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Створити співробітника</button>
            <a th:href="@{/staff}" class="btn btn-secondary">Скасувати</a>
        </div>
    </form>

</th:block>
</body>
</html>
