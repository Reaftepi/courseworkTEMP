<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content})}">
<body>
<th:block th:fragment="main-content">

    <h2 class="page-title" th:text="'Новий протокол для: ' + ${patient.fullName}">Новий протокол</h2>

    <form th:object="${protocol}" th:action="@{/medical/patient/{id}/new-protocol(id=${patient.id})}" method="post" class="card form-card form">

        <div class="form-group">
            <label for="result">Результат / Підсумок</label>
            <textarea id="result" th:field="*{result}" rows="5" class="form-control" placeholder="Опишіть результат лікування, фінальний діагноз, рекомендації..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Створити протокол</button>
            <a th:href="@{/medical/patient/{id}(id=${patient.id})}" class="btn btn-secondary">Скасувати</a>
        </div>
    </form>

</th:block>
</body>
</html>
