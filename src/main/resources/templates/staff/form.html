<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Новий співробітник | ClinicApp</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="page-body">
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/dashboard}">🏥 ClinicApp</a>
  <div class="nav-links">
    <a th:href="@{/staff}" class="nav-link active">Персонал</a>
  </div>
  <div class="nav-user">
    <form th:action="@{/logout}" method="post" style="display:inline">
      <button type="submit" class="btn-logout">Вийти</button>
    </form>
  </div>
</nav>
<div class="container">
  <div class="card form-card">
    <h2 class="card-title">👤 Новий співробітник</h2>
    <form th:action="@{/staff/new}" method="post" class="form">

      <div class="form-row">
        <div class="form-group">
          <label>Ім'я *</label>
          <input type="text" name="firstName" required placeholder="Ім'я"/>
        </div>
        <div class="form-group">
          <label>Прізвище *</label>
          <input type="text" name="lastName" required placeholder="Прізвище"/>
        </div>
      </div>

      <div class="form-group">
        <label>Посада</label>
        <input type="text" name="position" placeholder="напр. Лікар-психіатр"/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Логін *</label>
          <input type="text" name="login" required placeholder="логін для входу"/>
        </div>
        <div class="form-group">
          <label>Пароль *</label>
          <input type="password" name="password" required placeholder="пароль"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Роль *</label>
          <select name="role" required>
            <option th:each="r : ${roles}"
                    th:value="${r}"
                    th:text="${r}">Роль</option>
          </select>
        </div>
        <div class="form-group" style="align-self:center">
          <label class="checkbox-label">
            <input type="checkbox" name="medical" value="true"/>
            Медичний персонал (лікар)
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Зберегти</button>
        <a th:href="@{/staff}" class="btn btn-secondary">Скасувати</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
