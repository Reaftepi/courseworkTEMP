<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content})}">
<body>
<th:block th:fragment="main-content">

    <div class="page-header">
        <h2 class="page-title">Керування персоналом</h2>
        <a th:href="@{/staff/new}" class="btn btn-primary">+ Додати співробітника</a>
    </div>

    <div class="card">
        <table class="table" th:if="${not #lists.isEmpty(staffList)}">
            <thead>
            <tr>
                <th>Ім'я</th>
                <th>Посада</th>
                <th>Логін</th>
                <th>Роль</th>
                <th>Дата прийому</th>
                <th>Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${staffList}">
                <td th:text="${s.fullName}">-</td>
                <td th:text="${s.position}">-</td>
                <td th:text="${s.user.login}">-</td>
                <td th:text="${s.user.role}">-</td>
                <td th:text="${#temporals.format(s.dateOfEmployment, 'dd.MM.yyyy')}">-</td>
                <td class="actions">
                    <a th:href="@{/staff/{id}/edit(id=${s.id})}" class="btn btn-sm btn-warning">Редагувати</a>
                    <form th:action="@{/staff/{id}/delete(id=${s.id})}" method="post" class="form-inline">
                        <button type="submit" class="btn btn-sm btn-danger"
                                onclick="return confirm('Видалити співробітника?')">Видалити</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <p th:if="${#lists.isEmpty(staffList)}" class="text-muted p-3">
            Співробітників не знайдено.
        </p>
    </div>

</th:block>
</body>
</html>
