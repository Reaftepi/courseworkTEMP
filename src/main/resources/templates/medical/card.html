<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content})}">
<body>
<th:block th:fragment="main-content">

  <div class="page-header">
    <h2 class="page-title">Медична картка: <span th:text="${patient.fullName}"></span></h2>
    <div>
      <a th:href="@{/medical-records}" class="btn btn-secondary">← До списку пацієнтів</a>
      <!-- Новий протокол — через POST -->
      <form th:action="@{/medical/patient/{id}/protocol/new(id=${patient.id})}"
            method="post">
        <select name="staffId" required>
          <option value="">— оберіть лікаря —</option>
          <option th:each="doc : ${doctors}"
                  th:value="${doc.id}"
                  th:text="${doc.fullName}">Лікар</option>
        </select>
        <button type="submit" class="btn btn-primary">+ Новий протокол</button>
      </form>
    </div>
  </div>

  <!-- Список клінічних протоколів -->
  <div th:if="${not #lists.isEmpty(protocols)}">
    <div th:each="proto : ${protocols}" class="card protocol-card mt-3">
      <div class="protocol-header">
        <div>
          <strong>Протокол №<span th:text="${proto.id}"></span></strong>
          <span class="text-muted ml-2"
                th:text="${proto.startDate != null ? #temporals.format(proto.startDate,'dd.MM.yyyy') : '—'}">
          </span>
          — Лікар: <span th:text="${proto.staff.fullName}"></span>
        </div>
        <a th:href="@{/medical/protocol/{id}(id=${proto.id})}" class="btn btn-sm btn-info">
          Відкрити →
        </a>
      </div>
      <p th:if="${proto.result != null}" class="text-content mt-2">
        <strong>Результат:</strong> <span th:text="${proto.result}"></span>
      </p>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(protocols)}" class="card p-3 text-muted">
    Протоколів ще немає. Натисніть «+ Новий протокол» щоб розпочати.
  </div>

</th:block>
</body>
</html>
