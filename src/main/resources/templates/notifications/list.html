<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content})}">
<body>
<th:block th:fragment="main-content">

    <h2 class="page-title">Сповіщення</h2>

    <div class="card">
        <div th:if="${not #lists.isEmpty(notifications)}">
            <div th:each="n : ${notifications}"
                 class="notification-item"
                 th:classappend="${n.read ? 'read' : 'unread'}">

                <div class="notification-text">
                    <span class="notification-msg" th:text="${n.message}"></span>
                    <small class="text-muted" th:text="${#temporals.format(n.createdAt, 'dd.MM.yyyy HH:mm')}"></small>
                </div>
                <div class="notification-actions" th:if="${not n.read}">
                    <form th:action="@{/notifications/{id}/read(id=${n.id})}" method="post" class="form-inline">
                        <button type="submit" class="btn btn-sm btn-success" title="Позначити як прочитане">✓</button>
                    </form>
                </div>
            </div>
        </div>

        <p th:if="${#lists.isEmpty(notifications)}" class="text-muted p-3">
            У вас немає сповіщень.
        </p>
    </div>

</th:block>
</body>
</html>
