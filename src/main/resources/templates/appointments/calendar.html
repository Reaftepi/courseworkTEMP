<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content})}">
<body>

<th:block th:fragment="main-content">
    <div class="page-header">
        <h2 class="page-title">Розклад прийомів</h2>
        <a th:href="@{/appointments/new}" class="btn btn-primary">+ Новий запис</a>
    </div>

    <!-- Повідомлення про помилки та успіх тепер відображаються глобально через fragments/layout.html -->

    <div class="card mt-3">
        <div class="card-header">
            <h3 th:if="${showAll}">Всі заплановані прийоми</h3>
            <h3 th:unless="${showAll}">Прийоми на <span th:text="${#temporals.format(selectedDate, 'dd.MM.yyyy')}"></span></h3>

            <!-- Форма фільтрації -->
            <form th:action="@{/appointments}" method="get" class="filter-form">
                <div class="form-group">
                    <label for="staff">Лікар:</label>
                    <select id="staff" name="staffId" class="form-control">
                        <option value="">— всі лікарі —</option>
                        <option th:each="doc : ${doctors}"
                                th:value="${doc.id}"
                                th:text="${doc.fullName}"
                                th:selected="${doc.id == selectedStaffId}">Лікар</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Дата:</label>
                    <!-- selectedDate буде null, якщо showAll=true, що нормально для input type="date" -->
                    <input type="date" id="date" name="date" class="form-control" th:value="${selectedDate}">
                </div>
                <div class="filter-actions">
                    <button type="submit" class="btn btn-primary">Показати</button>
                    <a th:href="@{/appointments(showAll=true)}" class="btn btn-secondary">Показати всі прийоми</a>
                </div>
            </form>
        </div>
        <table class="table" th:if="${not #lists.isEmpty(appointments)}">
            <thead>
            <tr>
                <th>Час</th>
                <th>Пацієнт</th>
                <th>Тривалість</th>
                <th>Статус</th>
                <th>Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="apt : ${appointments}">
                <td th:text="${#temporals.format(apt.startTime,'HH:mm')}">—</td>
                <td>
                    <a th:href="@{/patients/{id}(id=${apt.patient.id})}"
                       th:text="${apt.patient.fullName}">—</a>
                </td>
                <td th:text="${apt.duration} + ' хв'">—</td>
                <td>
            <span class="status-badge"
                  th:classappend="${apt.status.name()}"
                  th:text="${apt.status}">—</span>
                </td>
                <td class="actions" th:if="${apt.status.name() == 'SCHEDULED'}">
                    <form th:action="@{/appointments/{id}/complete(id=${apt.id})}"
                          method="post" class="form-inline">
                        <button type="submit" class="btn btn-sm btn-success">✓ Завершено</button>
                    </form>
                    <form th:action="@{/appointments/{id}/cancel(id=${apt.id})}"
                          method="post" class="form-inline">
                        <button type="submit" class="btn btn-sm btn-danger"
                                onclick="return confirm('Скасувати запис?')">✗ Скасувати</button>
                    </form>
                    <a th:href="@{/appointments/{id}/edit(id=${apt.id})}" class="btn btn-sm btn-warning">✏️ Редагувати</a>
                </td>
                <td th:unless="${apt.status.name() == 'SCHEDULED'}">—</td>
            </tr>
            </tbody>
        </table>
        <p th:if="${#lists.isEmpty(appointments) and not showAll}" class="text-muted p-3">
            На обраний день записів немає.
        </p>
        <p th:if="${#lists.isEmpty(appointments) and showAll}" class="text-muted p-3">
            Запланованих прийомів немає.
        </p>
    </div>
</th:block>
</body>
</html>
