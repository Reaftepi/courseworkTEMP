<!DOCTYPE html>
<html th:fragment="layout(content)"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' | ClinicApp'">ClinicApp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- ====== НАВІГАЦІЯ ====== -->
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/dashboard}">ClinicApp</a>
    <div class="nav-links"> <!-- currentUri тепер надається GlobalControllerAdvice -->
        <a th:href="@{/dashboard}" class="nav-link"
           th:classappend="${currentUri.startsWith('/dashboard') ? 'active' : ''}">Дашборд</a>

        <a th:href="@{/patients}" class="nav-link"
           th:classappend="${currentUri.startsWith('/patients') ? 'active' : ''}">Пацієнти</a>

        <a th:href="@{/appointments}" class="nav-link"
           th:classappend="${currentUri.startsWith('/appointments') ? 'active' : ''}">Розклад</a>

        <a th:href="@{/medical-records}" class="nav-link" sec:authorize="hasRole('DOCTOR')"
           th:classappend="${currentUri.startsWith('/medical') ? 'active' : ''}">Медкартки</a>

        <a th:href="@{/staff}" class="nav-link" sec:authorize="hasRole('ADMIN')"
           th:classappend="${currentUri.startsWith('/staff') ? 'active' : ''}">Персонал</a>

        <a th:href="@{/notifications}" class="nav-link nav-link--notification"
           th:classappend="${currentUri.startsWith('/notifications') ? 'active' : ''}">
            <span>Сповіщення</span>
            <span class="badge"
                  th:text="${unreadNotifications}"
                  th:classappend="${unreadNotifications == 0 ? 'hidden' : ''}"></span>
        </a>
    </div>
    <!-- Ім'я користувача + вихід -->
    <div class="nav-user">
        <span sec:authentication="name" class="nav-username"></span>
        <form th:action="@{/logout}" method="post" class="form-inline">
            <button type="submit" class="btn-logout">Вийти</button>
        </form>
    </div>
</nav>

<!-- ====== FLASH-ПОВІДОМЛЕННЯ ====== -->
<div class="container">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-error"   th:text="${errorMessage}"></div>

    <!-- ====== ВМІСТ СТОРІНКИ ====== -->
    <div th:replace="${content}">Завантаження...</div>
</div>

</body>
</html>
