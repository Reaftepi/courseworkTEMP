<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content})}">
<body>
<th:block th:fragment="main-content">

    <div class="page-header">
        <h2 class="page-title" th:text="${patient.fullName}">Ім'я пацієнта</h2>
        <div class="form-actions">
            <a th:href="@{/patients/{id}/edit(id=${patient.id})}" class="btn btn-warning">Редагувати</a>
            <a th:href="@{/appointments/new(patientId=${patient.id})}" class="btn btn-primary">+ Новий запис</a>
        </div>
    </div>

    <div class="info-grid">
        <div class="card info-card">
            <h3>Основна інформація</h3>
            <dl class="info-list">
                <dt>Повне ім'я</dt>
                <dd th:text="${patient.fullName}">-</dd>

                <dt>Дата народження</dt>
                <dd th:text="${patient.birthday != null ? #temporals.format(patient.birthday, 'dd.MM.yyyy') : '—'}">-</dd>

                <dt>Стать</dt>
                <dd th:text="${patient.sex}">-</dd>

                <dt>Телефон</dt>
                <dd th:text="${patient.phoneNumber}">-</dd>
            </dl>
        </div>

        <div class="card info-card">
            <h3>Медичні показники</h3>
            <dl class="info-list">
                <dt>Зріст</dt>
                <dd th:text="${patient.height} + ' см'">-</dd>

                <dt>Вага</dt>
                <dd th:text="${patient.weight} + ' кг'">-</dd>

                <dt>Статус</dt>
                <dd th:text="${patient.status}">-</dd>

                <dt>Поведінка</dt>
                <dd th:text="${patient.behavior}">-</dd>
            </dl>
        </div>
    </div>

    <!-- Тут можна буде додати історію прийомів, протоколи тощо -->

</th:block>
</body>
</html>
