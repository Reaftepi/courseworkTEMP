<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content})}">
<body>
<th:block th:fragment="main-content">

    <h2 class="page-title" th:text="${patient.id == null ? 'Новий пацієнт' : 'Редагувати пацієнта'}">Форма пацієнта</h2>

    <form th:object="${patient}"
          th:action="${patient.id == null} ? @{/patients/new} : @{/patients/{id}/edit(id=${patient.id})}"
          method="post" class="card form-card form">

        <div class="form-row">
            <div class="form-group">
                <label for="firstName">Ім'я</label>
                <input type="text" id="firstName" th:field="*{firstName}" required>
            </div>
            <div class="form-group">
                <label for="lastName">Прізвище</label>
                <input type="text" id="lastName" th:field="*{lastName}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="birthday">Дата народження</label>
                <input type="date" id="birthday" th:field="*{birthday}">
            </div>
            <div class="form-group">
                <label for="sex">Стать</label>
                <select id="sex" th:field="*{sex}" required>
                    <option value="Чоловіча">Чоловіча</option>
                    <option value="Жіноча">Жіноча</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="phoneNumber">Номер телефону</label>
            <input type="tel" id="phoneNumber" th:field="*{phoneNumber}">
        </div>

        <hr style="border: none; border-top: 1px solid var(--border); margin: 8px 0;">

        <div class="form-row">
            <div class="form-group">
                <label for="height">Зріст (см)</label>
                <input type="number" id="height" th:field="*{height}" step="0.1">
            </div>
            <div class="form-group">
                <label for="weight">Вага (кг)</label>
                <input type="number" id="weight" th:field="*{weight}" step="0.1">
            </div>
        </div>

        <div class="form-group">
            <label for="status">Статус</label>
            <select id="status" th:field="*{status}" class="form-control">
                <option value="">-- Оберіть статус --</option>
                <option value="Амбулаторний">Амбулаторний</option>
                <option value="Денний стаціонар">Денний стаціонар</option>
                <option value="Стаціонарний">Стаціонарний</option>
            </select>
        </div>

        <div class="form-group">
            <label for="behavior">Поведінка</label>
            <textarea id="behavior" th:field="*{behavior}" rows="3"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Зберегти</button>
            <a th:href="@{/patients}" class="btn btn-secondary">Скасувати</a>
        </div>
    </form>
</th:block>
</body>
</html>
