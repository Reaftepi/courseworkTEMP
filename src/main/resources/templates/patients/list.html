<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content})}">
<body>

<!-- ====== ВМІСТ СТОРІНКИ ====== -->
<th:block th:fragment="main-content">

    <div class="page-header">
        <h2 class="page-title">Пацієнти</h2>
        <a th:href="@{/patients/new}" class="btn btn-primary">+ Додати пацієнта</a>
    </div>

    <!-- Пошук -->
    <form th:action="@{/patients}" method="get" class="search-bar">
        <input type="text" name="query" th:value="${query}"
               placeholder="Пошук за ПІБ..." class="search-input"/>
        <button type="submit" class="btn btn-secondary">Шукати</button>
        <a th:href="@{/patients}" class="btn btn-link">Скинути</a>
    </form>

    <!-- Таблиця пацієнтів -->
    <div class="card">
        <table class="table" th:if="${not #lists.isEmpty(patients)}">
            <thead>
            <tr>
                <th>#</th>
                <th>ПІБ</th>
                <th>Стать</th>
                <th>Статус</th>
                <th>Дата звернення</th>
                <th>Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${patients}">
                <td th:text="${p.id}">—</td>
                <td>
                    <a th:href="@{/patients/{id}(id=${p.id})}" th:text="${p.fullName}">—</a>
                </td>
                <td th:text="${p.sex}">—</td>
                <td th:text="${p.status}">—</td>
                <td th:text="${p.dateOfArrival != null ? #temporals.format(p.dateOfArrival,'dd.MM.yyyy') : '—'}">—</td>
                <td class="actions">
                    <a th:href="@{/patients/{id}(id=${p.id})}" class="btn btn-sm btn-secondary">👁</a>
                    <a th:href="@{/patients/{id}/edit(id=${p.id})}" class="btn btn-sm btn-warning">✏️</a>
                    <span sec:authorize="hasRole('DOCTOR')">
                        <a th:href="@{/medical/patient/{id}(id=${p.id})}" class="btn btn-sm btn-info">📋</a>
                    </span>
                    <a th:href="@{/appointments/new(patientId=${p.id})}" class="btn btn-sm btn-primary">+ Запис</a>
                    <form th:action="@{/patients/{id}/delete(id=${p.id})}" method="post" class="form-inline">
                        <button type="submit" class="btn btn-sm btn-danger"
                                onclick="return confirm('Видалити пацієнта?')">🗑</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <p th:if="${#lists.isEmpty(patients)}" class="text-muted p-3">
            Пацієнтів не знайдено.
        </p>
    </div>
</th:block>
</body>
</html>
