# ============================================================
# Підключення до PostgreSQL
# Змініть credentials під свою БД
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ddl-auto=update — Hibernate автоматично створює/оновлює таблиці
# Для production замініть на validate або none
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.docker.compose.enabled=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================================
# Thymeleaf — вимикаємо кеш під час розробки
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ============================================================
# Сесія — автоматичний вихід через 30 хвилин неактивності
# ============================================================
server.servlet.session.timeout=30m

# ============================================================
# Назва програми
# ============================================================
spring.application.name=ClinicApp
server.port=8083

app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
